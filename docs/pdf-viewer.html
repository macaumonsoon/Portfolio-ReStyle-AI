<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portfolio ReStyle AI — PDF preview</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #12131e; font-family: system-ui, sans-serif; }
    .bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 14px;
      padding: 10px 14px;
      background: #312e81;
      color: #e0e7ff;
      font-size: 14px;
    }
    .bar a { color: #c7d2fe; text-decoration: none; font-weight: 600; }
    .bar a:hover { text-decoration: underline; }
    .bar .grow { flex: 1; min-width: 8px; }
    #pages {
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      min-height: calc(100vh - 48px);
      background: #1e293b;
    }
    #pages canvas {
      max-width: 100%;
      height: auto;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      border-radius: 4px;
      background: #fff;
    }
    #status { color: #94a3b8; padding: 24px; text-align: center; max-width: 520px; margin: 0 auto; line-height: 1.5; }
    #status.err { color: #fca5a5; }
  </style>
</head>
<body>
  <div class="bar">
    <a href="./index.html">← Back / 返回</a>
    <span>Portfolio-ReStyle-AI-Design-Deck.pdf</span>
    <span class="grow"></span>
    <a href="./Portfolio-ReStyle-AI-Design-Deck.pdf" target="_blank" rel="noreferrer">在新分頁開啟 / Open in new tab</a>
  </div>
  <div id="status">載入預覽中… / Loading preview…</div>
  <div id="pages" hidden></div>
  <script type="module">
    const PDFJS_VER = "4.8.69";
    const pdfjsLib = await import(
      `https://cdn.jsdelivr.net/npm/pdfjs-dist@${PDFJS_VER}/build/pdf.mjs`
    );
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      `https://cdn.jsdelivr.net/npm/pdfjs-dist@${PDFJS_VER}/build/pdf.worker.mjs`;

    const pdfUrl = new URL("Portfolio-ReStyle-AI-Design-Deck.pdf", window.location.href).href;
    const statusEl = document.getElementById("status");
    const pagesEl = document.getElementById("pages");
    const dpr = Math.min(window.devicePixelRatio || 1, 2);

    try {
      const pdf = await pdfjsLib.getDocument({ url: pdfUrl }).promise;
      statusEl.remove();
      pagesEl.hidden = false;

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const base = page.getViewport({ scale: 1 });
        const maxW = Math.min(window.innerWidth - 32, 920);
        const scale = (maxW / base.width) * dpr;
        const viewport = page.getViewport({ scale });
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        canvas.style.width = `${viewport.width / dpr}px`;
        canvas.style.height = `${viewport.height / dpr}px`;
        const task = page.render({ canvasContext: ctx, viewport });
        await task.promise;
        pagesEl.appendChild(canvas);
      }
    } catch (e) {
      console.error(e);
      statusEl.className = "err";
      statusEl.innerHTML =
        "瀏覽器內預覽載入失敗（常見於網路或內嵌瀏覽器限制）。請點上方「在新分頁開啟」用系統檢視器查看。<br/><br/>" +
        "In-page preview failed. Use <strong>Open in new tab</strong> above.";
    }
  </script>
</body>
</html>
